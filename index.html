<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dylan Grow — IT Support & Network Specialist</title>
    <meta name="description" content="CompTIA A+ Certified IT Professional specializing in enterprise support, networking, and secure infrastructure."/>
    <meta name="theme-color" content="#22c55e"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <style>
        :root{--bg:#050507;--bg-el:#0f0f12;--bg-card:#111114;--bg-card2:#18181c;--border:#27272a;--border-l:#3f3f46;--text:#f4f4f5;--text-m:#a1a1aa;--text-d:#71717a;--green:#22c55e;--green-d:#16a34a;--green-dim:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.22)}
        html.light{--bg:#f8fafc;--bg-el:#fff;--bg-card:#fff;--bg-card2:#f1f5f9;--border:#e2e8f0;--border-l:#cbd5e1;--text:#0f172a;--text-m:#475569;--text-d:#94a3b8;--green:#15803d;--green-d:#166534;--green-dim:rgba(21,128,61,.08);--green-border:rgba(21,128,61,.2)}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;color-scheme:dark}body{font-family:ui-sans-serif,system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);overflow-x:hidden}
        .mono{font-family:ui-monospace,monospace}.mesh-fixed{position:fixed;inset:0;pointer-events:none;opacity:.5;background-image:radial-gradient(at 20% 30%,rgba(34,197,94,.12) 0,transparent 50%),radial-gradient(at 80% 20%,rgba(34,197,94,.07) 0,transparent 50%),radial-gradient(at 50% 80%,rgba(34,197,94,.06) 0,transparent 50%)}
        .container{max-width:1400px;margin:0 auto;padding:0 1rem}.site-header{position:sticky;top:0;z-index:40;border-bottom:1px solid rgba(39,39,42,.5);background:rgba(5,5,7,.85);backdrop-filter:blur(12px)}
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="mesh-fixed"></div>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:0">
                    <div class="brand-logo">DG</div>
                    <div class="brand-text min-w-0">
                        <div class="brand-name mono" id="typewriter"></div>
                        <div class="brand-sub">IT PROFESSIONAL</div>
                    </div>
                </div>
                <nav aria-label="Main navigation" class="nav-tabs">
                    <button class="tab-btn" data-tab="home">Home</button>
                    <button class="tab-btn" data-tab="about">About</button>
                    <button class="tab-btn" data-tab="work">Work</button>
                    <button class="tab-btn" data-tab="booking">Booking</button>
                </nav>
                <div class="flex-1"></div>
                <div class="clock-wrap">
                    <div style="text-align:right">
                        <div class="clock-date text-dim" id="live-date"></div>
                        <div class="clock-time mono" id="live-clock"></div>
                    </div>
                </div>
                <button aria-label="Toggle theme" class="theme-btn" id="theme-toggle">
                    <svg class="icon-sun" fill="none" height="16" stroke="currentColor" viewBox="0 0 24 24" width="16"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                    <svg class="icon-moon" fill="none" height="16" stroke="currentColor" viewBox="0 0 24 24" width="16"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                </button>
            </div>
        </div>
    </header>
    <main class="container" id="main-content">
        </main>
    <script src="main.js" defer></script>
</body>
</html>
