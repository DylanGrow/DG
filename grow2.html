<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan Grow | Command Center</title>
    <style>
        body { background: #0b0e11; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        #clock { font-size: 50px; text-shadow: 0 0 10px #00ff41; margin: 20px 0; font-weight: bold; }
        
        .dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; min-width: 300px; flex: 1; }

        /* Search Bar Styling */
        .search-container { margin-bottom: 20px; }
        input[type="text"] { 
            width: 85%; padding: 12px; border-radius: 20px; 
            border: 1px solid #00ff41; background: #0b0e11; color: #00ff41;
            outline: none; font-family: inherit; text-align: center;
        }

        /* Responsive Links Grid */
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .links a { 
            color: #ffffff; text-decoration: none; border: 1px solid #30363d; 
            padding: 12px; display: block; border-radius: 5px; transition: 0.3s; font-size: 14px;
        }
        .links a:hover { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }

        h3 { border-bottom: 1px solid #30363d; padding-bottom: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        
        /* Weather Container */
        .weather-container { width: 100%; height: 230px; border-radius: 5px; border: 1px solid #30363d; overflow: hidden; background: #000; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body onload="startTime()">

    <div id="clock">00:00:00</div>

    <div class="dashboard">
        <div class="card">
            <h3>Intelligence</h3>
            <div class="search-container">
                <form action="https://duckduckgo.com/" method="get">
                    <input type="text" name="q" placeholder="Ask AI..." autofocus autocomplete="off">
                    <input type="hidden" name="ia" value="chat">
                </form>
            </div>
            
            <div class="weather-container">
                <iframe src="https://www.meteoblue.com/en/weather/widget/three/new-bern_united-states_4481944?geoloc=fixed&nocurrent=0&noforecast=0&days=4&tempunit=FAHRENHEIT&windunit=MILE_PER_HOUR&layout=dark" 
                        allowtransparency="true" 
                        sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
                </iframe>
            </div>
        </div>

        <div class="card">
            <h3>System Access</h3>
            <div class="links">
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                <a href="https://reddit.com/r/sysadmin" target="_blank">SysAdmin</a>
                <a href="https://portal.azure.com" target="_blank">Azure</a>
                <a href="https://chatgpt.com" target="_blank">ChatGPT</a>
                <a href="https://stackoverflow.com" target="_blank">StackOverflow</a>
            </div>
        </div>

        <div class="card">
            <h3>Identity</h3>
            <div class="badge-base LI-profile-badge" data-locale="en_US" data-size="medium" data-theme="dark" data-type="VERTICAL" data-vanity="dgrow27" data-version="v1">
                <a class="badge-base__link LI-simple-link" href="https://www.linkedin.com/in/dgrow27?trk=profile-badge">Dylan G.</a>
            </div>
        </div>
    </div>

    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
    <script>
        function startTime() {
            const today = new Date();
            document.getElementById('clock').innerHTML = today.toLocaleTimeString();
            setTimeout(startTime, 1000);
        }
    </script>
</body>
</html>
